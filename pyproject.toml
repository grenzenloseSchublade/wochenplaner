[project]
name = "wochenplaner"
version = "0.1.0"
description = "Lokaler Wochenplaner mit proportionalen Zeitblöcken und PDF-Export"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.32.0",
    "reportlab>=4.2.0",
    "Pillow>=10.0.0",
    "matplotlib>=3.8.0",
    "plotly>=5.18.0",
]

[dependency-groups]
dev = ["ruff>=0.9.0"]
desktop = [
    "streamlit-desktop-app>=0.0.5",
    "pyinstaller>=6.0.0",
    "PyGObject>=3.46.0,<3.51.0; platform_system == 'Linux'", # >=3.51.0 erfordert girepository-2.0 (nicht in Debian Bookworm)
    "pycairo>=1.24.0; platform_system == 'Linux'",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["pdf_export"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
